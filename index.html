<!DOCTYPE html>
<html lang="fr" xmlns="og: https://ogp.me/ns#">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Putain de Nénuphar</title>

        <link rel="stylesheet" href="/src/style.css" type="text/css" />
    </head>
    <body class="bg-[#1C1C1D] flex flex-col items-center justify-center min-h-screen">
        <div class="mb-8 text-white text-center bg-orange-500 rounded-2xl p-4">
            <h1 class="text-2xl font-bold">Elle n'est pas ℝousse, mais vous allez l'aimer !</h1>
            <p>La nouvelle version du site Putain de ℕénuphar est là.</p>
        </div>

        <div class="w-[680px] bg-[#252728] rounded-2xl" id="post">
            <!-- En-tête -->
            <div class="flex justify-between px-4 py-3">
                <div class="flex items-center gap-x-3">
                    <!-- Photo de profil -->
                    <div class="rounded-full overflow-hidden">
                        <label class="hover:cursor-pointer hover:opacity-70">
                            <img id="avatar" src="/images/big-brother.png" class="w-10 h-10 rounded-full" />
                            <input type="file" id="avatar-input" accept="image/avif,image/gif,image/jpeg,image/png,image/webp" class="hidden" />
                        </label>
                    </div>

                    <div>
                        <div class="text-[15px] leading-tight">
                            <span class="font-semibold text-white hover:underline hover:cursor-pointer" target="_blank" contenteditable="true" spellcheck="false">Big Brother</span>
                            <span class="text-[#b0b3b8]" contenteditable="true" spellcheck="false">est devenu complètement paranoïaque.</span>
                        </div>

                        <div class="flex items-center gap-x-1 text-[#b0b3b8] text-xs">
                            <span class="font-semibold hover:underline hover:cursor-pointer" contenteditable="true" spellcheck="false">13 mai 2021</span>
                            <span>·</span>
                            <!-- SVG copié de Facebook (facebook.com) -->
                            <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor" role="img" title="Partagé avec&nbsp;: Public">
                                <g fill-rule="evenodd" transform="translate(-448 -544)">
                                    <path d="M109.5 408.5c0 3.23-2.04 5.983-4.903 7.036l.07-.036c1.167-1 1.814-2.967 2-3.834.214-1 .303-1.3-.5-1.96-.31-.253-.677-.196-1.04-.476-.246-.19-.356-.59-.606-.73-.594-.337-1.107.11-1.954.223a2.666 2.666 0 0 1-1.15-.123c-.007 0-.007 0-.013-.004l-.083-.03c-.164-.082-.077-.206.006-.36h-.006c.086-.17.086-.376-.05-.529-.19-.214-.54-.214-.804-.224-.106-.003-.21 0-.313.004l-.003-.004c-.04 0-.084.004-.124.004h-.037c-.323.007-.666-.034-.893-.314-.263-.353-.29-.733.097-1.09.28-.26.863-.8 1.807-.22.603.37 1.166.667 1.666.5.33-.11.48-.303.094-.87a1.128 1.128 0 0 1-.214-.73c.067-.776.687-.84 1.164-1.2.466-.356.68-.943.546-1.457-.106-.413-.51-.873-1.28-1.01a7.49 7.49 0 0 1 6.524 7.434" transform="translate(354 143.5)" />
                                    <path d="M104.107 415.696A7.498 7.498 0 0 1 94.5 408.5a7.48 7.48 0 0 1 3.407-6.283 5.474 5.474 0 0 0-1.653 2.334c-.753 2.217-.217 4.075 2.29 4.075.833 0 1.4.561 1.333 2.375-.013.403.52 1.78 2.45 1.89.7.04 1.184 1.053 1.33 1.74.06.29.127.65.257.97a.174.174 0 0 0 .193.096" transform="translate(354 143.5)" />
                                    <path fill-rule="nonzero" d="M110 408.5a8 8 0 1 1-16 0 8 8 0 0 1 16 0zm-1 0a7 7 0 1 0-14 0 7 7 0 0 0 14 0z" transform="translate(354 143.5)" />
                                </g>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Menu hamburger -->
                <button class="p-2 hover:bg-[#3a3b3c] rounded-full transition-colors" onclick="javascript:alert('Putain de bouton inutile.');">
                    <!-- SVG copié de Facebook (facebook.com) -->
                    <svg viewBox="0 0 20 20" width="20" height="20" fill="#b0b3b8" aria-hidden="true">
                        <g fill-rule="evenodd" transform="translate(-446 -350)">
                            <path d="M458 360a2 2 0 1 1-4 0 2 2 0 0 1 4 0m6 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0m-12 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0" />
                        </g>
                    </svg>
                </button>
            </div>

            <!-- Contenu principal -->
            <div class="h-[382.5px] flex flex-col justify-center text-3xl text-center" style="background:linear-gradient(135deg,rgb(116,167,126),rgb(24,175,78));color:rgb(255,255,255)" id="quotation">
                <span class="font-bold" contenteditable="true" spellcheck="false">Putain de ℕénuphar</span>
                <span id="hashtags" class="font-semibold mt-2 underline" contenteditable="true" spellcheck="false">#hyperréactif</span>
            </div>

            <!-- Barre d'engagement & d'outils -->
            <div class="flex items-center">
                <div class="px-4 py-3 rounded-bl-xl hover:bg-[#3B3D3E] hover:cursor-pointer transition-colors" id="share-button">
                    <i style="filter:invert(62%) sepia(98%) saturate(12%) hue-rotate(175deg) brightness(90%) contrast(96%);background-image: url(/images/fb-icons.webp); background-position: 0px -588px; background-size: auto; width: 20px; height: 20px; background-repeat: no-repeat; display: inline-block;"></i>
                </div>
                <div class="px-4 py-3" id="color-toolbar">
                    <input type="color" class="w-6 rounded bg-transparent border-none" id="bg-color-picker-1" autocomplete="off" value="#74a77e" />
                    <input type="color" class="w-6 rounded bg-transparent border-none" id="bg-color-picker-2" autocomplete="off" value="#18af4d" />
                    <input type="color" class="w-6 rounded bg-transparent border-none" id="text-color-picker" autocomplete="off" value="#ffffff" />
                </div>
            </div>
        </div>

        <!-- Disclaimer Yuganix Hosting -->
        <div class="mt-2 text-gray-500">
            <span>Vous cherchez le portail des applications du <span class="font-semibold">Projet ℕénuphar × Yuganix Hosting</span></span> ?
            <span>Cliquez <a href="https://yhosting.putaindenenuphar.fr/" class="hover:underline">ici</a>.</span>
        </div>

        <!-- Fichiers JavaScript -->
        <script src="/src/avatars.ts" type="module"></script>
        <script src="/src/backgroundColor.ts" type="module"></script>
        <script src="/src/hashtags.ts" type="module"></script>
        <script src="/src/quotation.ts" type="module"></script>
        <script src="/src/textColor.ts" type="module"></script>
    </body>
</html>
